services:
  V2V:
    build: .
    image: v2v_image
    container_name: v2v_server
    restart: always
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./.env:/app/.env:ro
      - ./roles.json:/app/roles.json:ro
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - TZ=${TIMEZONE:-Asia/Ho_Chi_Minh}
